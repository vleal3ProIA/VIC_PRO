# ============================================================================
# Deploy a producción (Cloudflare Pages)
# ----------------------------------------------------------------------------
# Migrado desde FTPS Dondominio (que tardaba 25-45 min y daba timeouts) a
# Cloudflare Pages (deploy en 30-60 segundos via wrangler CLI).
#
# Triggers:
#   - push a `main` (auto-deploy tras merge de PR)
#   - workflow_dispatch (manual desde la UI de GitHub Actions)
#
# Flujo:
#   1. Checkout
#   2. Flutter setup
#   3. flutter pub get + gen-l10n
#   4. flutter analyze (gate)
#   5. flutter test (gate)
#   6. scripts/generate_seo.dart (rellena meta tags + sitemap + robots)
#   7. flutter build web --release (con --dart-define=...)
#   8. Sentry source maps upload (opcional)
#   9. wrangler pages deploy build/web -> Cloudflare Pages
#
# **Secrets requeridos** en GitHub → Settings → Secrets → Actions:
#   - CLOUDFLARE_API_TOKEN     token con scopes Cloudflare Pages: Edit +
#                              Account Settings: Read + User Details: Read.
#                              Generado en dash.cloudflare.com/profile/api-tokens.
#   - CLOUDFLARE_ACCOUNT_ID    32 chars hex (visible en la URL del dashboard
#                              cloudflare.com/<ID>/...).
#   - SITE_URL                 https://testexamen.es (sin slash final)
#   - SUPABASE_URL_PROD        URL del proyecto Supabase de produccion
#   - SUPABASE_ANON_KEY_PROD   anon key del proyecto Supabase de produccion
#   - APP_NAME_PROD            (opcional) nombre comercial para meta tags
#   - SEO_DESCRIPTION          (opcional) descripción para meta tags
#   - SENTRY_DSN_PROD          (opcional) DSN de Sentry para errores en prod
#   - SENTRY_AUTH_TOKEN        (opcional) para subir source maps
#   - POSTHOG_API_KEY_PROD     (opcional) Project API Key de PostHog
#
# **Variables (no secrets)** en GitHub → Settings → Variables → Actions:
#   - FLUTTER_VERSION          debe coincidir con el ci.yml (3.41.6)
#
# Secrets FTP_HOST, FTP_USERNAME, FTP_PASSWORD, FTP_DIR ya NO se usan tras
# la migracion. Pueden borrarse de GitHub Settings cuando se confirme que
# Cloudflare Pages funciona estable durante 1-2 semanas.
# ============================================================================

name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

# Solo permitir un deploy a la vez — si llega un push nuevo mientras
# uno está en curso, espera (NO cancela, para no dejar produccion
# en estado intermedio).
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Build · Generate SEO · Cloudflare Pages
    runs-on: ubuntu-latest
    # 15 min: build Flutter web ~7-10 min + wrangler deploy ~1-2 min.
    # Subido vs el FTP antiguo (45 min) tras migracion a Cloudflare Pages.
    timeout-minutes: 15
    environment:
      name: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ─── Validate secrets antes de gastar minutos ───
      - name: Validate required secrets
        run: |
          missing=""
          [ -z "${{ secrets.CLOUDFLARE_API_TOKEN }}" ]    && missing="$missing CLOUDFLARE_API_TOKEN"
          [ -z "${{ secrets.CLOUDFLARE_ACCOUNT_ID }}" ]   && missing="$missing CLOUDFLARE_ACCOUNT_ID"
          [ -z "${{ secrets.SITE_URL }}" ]                && missing="$missing SITE_URL"
          [ -z "${{ secrets.SUPABASE_URL_PROD }}" ]       && missing="$missing SUPABASE_URL_PROD"
          [ -z "${{ secrets.SUPABASE_ANON_KEY_PROD }}" ]  && missing="$missing SUPABASE_ANON_KEY_PROD"
          if [ -n "$missing" ]; then
            echo "❌ Missing required secrets:$missing"
            echo "   Configure them in Settings → Secrets → Actions."
            exit 1
          fi
          echo "✓ All required secrets present"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ vars.FLUTTER_VERSION || '3.41.6' }}
          channel: stable
          cache: true

      - name: pub get
        run: flutter pub get

      # `.env` esta declarado como asset en pubspec.yaml; sin el, `flutter
      # analyze` lanza `asset_does_not_exist` (warning -> falla con
      # --no-fatal-infos) y el build no empaqueta el asset. Las credenciales
      # REALES entran por --dart-define en el step "Build web"; este .env es
      # solo un placeholder para que el asset exista (mismo patron que ci.yml).
      - name: Create dummy .env for build assets
        run: |
          cat > .env <<'EOF'
          APP_NAME=myapp
          APP_ENV=production
          SUPABASE_URL=https://placeholder.supabase.co
          SUPABASE_ANON_KEY=placeholder-anon-key
          OTP_CODE_LENGTH=6
          ENABLE_LOGGING=false
          ENABLE_ANALYTICS=false
          EOF

      - name: gen-l10n
        run: flutter gen-l10n

      # ─── Gates antes de desplegar ───
      - name: Analyze
        run: flutter analyze --no-fatal-infos

      # Excluimos los golden tests: se generan en Windows (maquina del dev)
      # y el rendering de Linux NO es bit-exact, asi que fallan por diffs de
      # pixeles en el runner. Mismo patron que ci.yml. Los goldens se validan
      # en local con `flutter test --tags golden`.
      - name: Test
        run: flutter test --no-pub --exclude-tags golden

      # ─── Inyectar SEO meta tags ───
      - name: Generate SEO assets
        run: |
          dart run scripts/generate_seo.dart \
            --site-url="${{ secrets.SITE_URL }}" \
            --site-name="${{ secrets.APP_NAME_PROD || 'myapp' }}" \
            --description="${{ secrets.SEO_DESCRIPTION || 'A modern Flutter Web SaaS' }}"

      # ─── Build con dart-defines de produccion ───
      # --no-web-resources-cdn: empaqueta y usa CanvasKit LOCAL (carpeta
      # canvaskit/) en vez de bajarlo de gstatic.com. Sin esto el bootstrap
      # hace fetch() del wasm de CanvasKit desde el CDN, lo que cae bajo
      # `connect-src` de la CSP -> el navegador lo BLOQUEA y la app se queda
      # en la pantalla de carga. Servirlo same-origin desde Cloudflare Pages
      # ademas elimina la dependencia de un tercero.
      - name: Build web
        run: |
          flutter build web --release --no-web-resources-cdn \
            --dart-define=ENV=prod \
            --dart-define=APP_VERSION=${{ github.sha }} \
            --dart-define=SUPABASE_URL=${{ secrets.SUPABASE_URL_PROD }} \
            --dart-define=SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY_PROD }} \
            --dart-define=SENTRY_DSN=${{ secrets.SENTRY_DSN_PROD }} \
            --dart-define=POSTHOG_API_KEY=${{ secrets.POSTHOG_API_KEY_PROD }}

      # ─── Verificar que el build tiene los archivos esperados ───
      # NOTA: Cloudflare Pages NO lee `.htaccess` (es Apache-only). Los
      # headers HTTP (CSP, HSTS, cache-control) se configuran via fichero
      # `_headers` en la raiz del proyecto si se necesitan. Por ahora la
      # CSP la inyecta el index.html via <meta http-equiv> y Pages anyade
      # SSL/HSTS automaticamente.
      - name: Smoke check build output
        run: |
          test -f build/web/index.html
          test -f build/web/main.dart.js
          test -f build/web/flutter_bootstrap.js
          test -f build/web/robots.txt
          test -f build/web/sitemap.xml
          echo "✓ Build artifacts present"

      # ─── Sentry source maps upload (legible stack traces) ───
      # SOLO si SENTRY_AUTH_TOKEN esta configurado. Sin ese secret,
      # los errores capturados muestran nombres minificados (JI.gF) en
      # vez de funciones reales. Con upload, Sentry symbolicates al vuelo.
      - name: Upload source maps to Sentry
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: app-victor
          SENTRY_PROJECT: testexamen-web
        run: |
          if [ -z "$SENTRY_AUTH_TOKEN" ]; then
            echo "SENTRY_AUTH_TOKEN no esta configurado - saltando upload de source maps."
            exit 0
          fi
          curl -sL https://sentry.io/get-cli/ | bash
          sentry-cli releases new "${{ github.sha }}"
          sentry-cli sourcemaps inject --release "${{ github.sha }}" build/web
          sentry-cli sourcemaps upload \
            --release "${{ github.sha }}" \
            --url-prefix '~/' \
            build/web
          sentry-cli releases finalize "${{ github.sha }}"
          echo "Source maps uploaded for release ${{ github.sha }}"

      # ─── Deploy a Cloudflare Pages ───
      # wrangler.toml NO necesario para Pages (no usa Workers config).
      # `pages deploy` usa la API REST y sube los archivos con HTTP/2 +
      # paralelizado: tipicamente 30-60 segundos para el bundle Flutter
      # completo (~14 MB), vs los 25-45 min del FTP anterior.
      #
      # --branch=main hace que este deployment sea el "production" del
      # proyecto (visible en testexamen-web.pages.dev y en el custom
      # domain testexamen.es).
      #
      # --commit-hash registra el SHA del commit en cloudflare para
      # poder identificar el rollback target si hay que volver atras.
      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx --yes wrangler@latest pages deploy build/web \
            --project-name=testexamen-web \
            --branch=main \
            --commit-hash="${{ github.sha }}" \
            --commit-message="${{ github.event.head_commit.message || 'manual dispatch' }}"

      - name: Notify success
        if: success()
        run: |
          echo "✅ Deployed to ${{ secrets.SITE_URL }} via Cloudflare Pages"
          echo "Commit: ${{ github.sha }}"
          echo "Preview: https://testexamen-web.pages.dev"
