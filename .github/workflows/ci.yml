name: CI

# Corre en cada push a main y en cada PR contra main.
# Si cualquier paso falla, el check sale en rojo y (con branch protection
# configurada) bloquea el merge.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancela ejecuciones antiguas de la misma rama si llega un push nuevo.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ───────────────────────────────────────────────────────────────────────
  # Job 1: Edge Function tests (Deno). Corre en paralelo al job Flutter
  # porque sus dependencias son disjuntas (Deno vs Flutter SDK).
  # ───────────────────────────────────────────────────────────────────────
  deno-tests:
    name: Edge Function tests (Deno)
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          # `v1.x` para alinear con la version que actualmente corre
          # Supabase Edge Runtime (la mayor parte del std existente se
          # escribio en Deno 1.x). Si Supabase actualiza a Deno 2.x
          # estable, cambiamos aqui y nos aseguramos de que los tests
          # siguen pasando.
          deno-version: v1.x

      - name: Deno version
        run: deno --version

      # Los tests viven en `supabase/functions/_shared/__tests__/` y
      # validan:
      #   - html_sanitize.ts (PR-D Day 1): whitelist de tags, javascript:
      #     href stripping, XSS vectors clasicos.
      #   - magic_bytes.ts (PR-A Day 1): validacion del primer bloque
      #     de bytes de un upload + heuristica UTF-8 + SHA-256.
      #
      # **Permisos**:
      #   --allow-read    Los tests leen los .ts del proyecto para los
      #                   imports relativos (sin esto los tests no
      #                   resolverian `../html_sanitize.ts`).
      #
      # NO necesitamos --allow-net: Deno resuelve los imports remotos
      # (deno.land/std) durante la fase de compilacion del modulo, no
      # como llamadas en runtime. Una vez compilado, no hace fetches.
      - name: Run Edge Function tests
        run: deno test --allow-read _shared/__tests__/
        working-directory: supabase/functions

  # ───────────────────────────────────────────────────────────────────────
  # Job 2: Flutter analyze + tests + build web.
  # ───────────────────────────────────────────────────────────────────────
  analyze-test-build:
    name: Analyze · Test · Build web
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.41.6
          channel: stable
          cache: true

      - name: Flutter version
        run: flutter --version

      - name: Install dependencies
        run: flutter pub get

      # El build de web necesita que exista `.env` porque está listado como
      # asset en pubspec.yaml. Valores dummy: el build NO ejecuta main(),
      # solo necesita que el archivo exista. Las credenciales reales viven
      # en el .env local (gitignored) y, para deploy, en secrets del repo.
      - name: Create dummy .env for build assets
        run: |
          cat > .env <<'EOF'
          APP_NAME=myapp
          APP_ENV=ci
          SUPABASE_URL=https://ci-placeholder.supabase.co
          SUPABASE_ANON_KEY=ci-placeholder-anon-key
          OTP_CODE_LENGTH=6
          ENABLE_LOGGING=false
          ENABLE_ANALYTICS=false
          EOF

      - name: Generate localizations
        run: flutter gen-l10n

      - name: Analyze (very_good_analysis)
        run: flutter analyze

      # Excluimos los tests con tag `golden` en CI: las imágenes de referencia
      # se generan en la máquina del dev (Windows / macOS) y el rendering de
      # Linux no es bit-exact respecto a otros sistemas. Los goldens corren
      # localmente con `flutter test`. Ver dart_test.yaml.
      - name: Run tests with coverage (sin goldens)
        run: flutter test --coverage --reporter expanded --exclude-tags golden

      # ----- Cobertura -------------------------------------------------------
      - name: Install lcov
        run: sudo apt-get update && sudo apt-get install -y lcov

      - name: Filter and summarise coverage
        run: |
          if [ ! -f coverage/lcov.info ]; then
            echo "::warning::No se generó coverage/lcov.info"
            exit 0
          fi
          # Excluimos código generado (l10n) del cómputo: ya está cubierto
          # implícitamente al renderizarse y no es nuestro código real.
          lcov --remove coverage/lcov.info \
            'lib/generated/*' \
            --output-file coverage/lcov.filtered.info \
            --ignore-errors unused
          SUMMARY=$(lcov --summary coverage/lcov.filtered.info 2>&1)
          echo "$SUMMARY"
          LINES_PCT=$(echo "$SUMMARY" | grep -oP 'lines\.+:\s*\K[0-9.]+' || echo "?")
          FUNCTIONS_PCT=$(echo "$SUMMARY" | grep -oP 'functions\.+:\s*\K[0-9.]+' || echo "?")
          {
            echo "## 🧪 Test coverage"
            echo ""
            echo "| Metric | % |"
            echo "|---|---|"
            echo "| Lines | ${LINES_PCT}% |"
            echo "| Functions | ${FUNCTIONS_PCT}% |"
            echo ""
            echo "_Objetivo: ≥ 80 % en \`domain/\` y \`data/\`. Hoy aún no se exige umbral en CI._"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: coverage/lcov.info
          retention-days: 30

      - name: Upload to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: coverage/lcov.info
          fail_ci_if_error: false
          # En repos privados Codecov requiere el secret CODECOV_TOKEN
          # configurado en Settings → Secrets. En públicos no hace falta.
          token: ${{ secrets.CODECOV_TOKEN }}
        continue-on-error: true

      # ----- Build -----------------------------------------------------------
      # Las flags `--dart-define` bakean los valores en el bundle JS final.
      # - `ENV=ci`         → EnvConfig lo trata como `development` (no
      #                       contamina métricas de prod si alguien sirve
      #                       este artifact).
      # - `SENTRY_DSN`     → del secret SENTRY_DSN_WEB del repo. Si está
      #                       vacío (PR de fork sin secrets, p.ej.) el
      #                       SentryService queda en no-op sin romper nada.
      # - `APP_VERSION`    → tag de release para agrupar eventos en Sentry.
      - name: Build web (release)
        env:
          SENTRY_DSN_WEB: ${{ secrets.SENTRY_DSN_WEB }}
          APP_VERSION: ${{ secrets.APP_VERSION }}
        run: |
          flutter build web --release \
            --dart-define=ENV=ci \
            --dart-define=SENTRY_DSN="$SENTRY_DSN_WEB" \
            --dart-define=APP_VERSION="$APP_VERSION"

      - name: Upload web build artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: build/web
          retention-days: 7
