name: CI

# Corre en cada push a main y en cada PR contra main.
# Si cualquier paso falla, el check sale en rojo y (con branch protection
# configurada) bloquea el merge.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancela ejecuciones antiguas de la misma rama si llega un push nuevo.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze-test-build:
    name: Analyze · Test · Build web
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.41.6
          channel: stable
          cache: true

      - name: Flutter version
        run: flutter --version

      - name: Install dependencies
        run: flutter pub get

      # El build de web necesita que exista `.env` porque está listado como
      # asset en pubspec.yaml. Valores dummy: el build NO ejecuta main(),
      # solo necesita que el archivo exista. Las credenciales reales viven
      # en el .env local (gitignored) y, para deploy, en secrets del repo.
      - name: Create dummy .env for build assets
        run: |
          cat > .env <<'EOF'
          APP_NAME=myapp
          APP_ENV=ci
          SUPABASE_URL=https://ci-placeholder.supabase.co
          SUPABASE_ANON_KEY=ci-placeholder-anon-key
          OTP_CODE_LENGTH=6
          ENABLE_LOGGING=false
          ENABLE_ANALYTICS=false
          EOF

      - name: Generate localizations
        run: flutter gen-l10n

      - name: Analyze (very_good_analysis)
        run: flutter analyze

      # Excluimos los tests con tag `golden` en CI: las imágenes de referencia
      # se generan en la máquina del dev (Windows / macOS) y el rendering de
      # Linux no es bit-exact respecto a otros sistemas. Los goldens corren
      # localmente con `flutter test`. Ver dart_test.yaml.
      - name: Run tests with coverage (sin goldens)
        run: flutter test --coverage --reporter expanded --exclude-tags golden

      # ----- Cobertura -------------------------------------------------------
      - name: Install lcov
        run: sudo apt-get update && sudo apt-get install -y lcov

      - name: Filter and summarise coverage
        run: |
          if [ ! -f coverage/lcov.info ]; then
            echo "::warning::No se generó coverage/lcov.info"
            exit 0
          fi
          # Excluimos código generado (l10n) del cómputo: ya está cubierto
          # implícitamente al renderizarse y no es nuestro código real.
          lcov --remove coverage/lcov.info \
            'lib/generated/*' \
            --output-file coverage/lcov.filtered.info \
            --ignore-errors unused
          SUMMARY=$(lcov --summary coverage/lcov.filtered.info 2>&1)
          echo "$SUMMARY"
          LINES_PCT=$(echo "$SUMMARY" | grep -oP 'lines\.+:\s*\K[0-9.]+' || echo "?")
          FUNCTIONS_PCT=$(echo "$SUMMARY" | grep -oP 'functions\.+:\s*\K[0-9.]+' || echo "?")
          {
            echo "## 🧪 Test coverage"
            echo ""
            echo "| Metric | % |"
            echo "|---|---|"
            echo "| Lines | ${LINES_PCT}% |"
            echo "| Functions | ${FUNCTIONS_PCT}% |"
            echo ""
            echo "_Objetivo: ≥ 80 % en \`domain/\` y \`data/\`. Hoy aún no se exige umbral en CI._"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: coverage/lcov.info
          retention-days: 30

      - name: Upload to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: coverage/lcov.info
          fail_ci_if_error: false
          # En repos privados Codecov requiere el secret CODECOV_TOKEN
          # configurado en Settings → Secrets. En públicos no hace falta.
          token: ${{ secrets.CODECOV_TOKEN }}
        continue-on-error: true

      # ----- Build -----------------------------------------------------------
      - name: Build web (release)
        run: flutter build web --release --dart-define=ENV=ci

      - name: Upload web build artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: build/web
          retention-days: 7
