# ============================================================================
# Deploy de Supabase Edge Functions
# ----------------------------------------------------------------------------
# Triggers:
#   - push a `main` que toque cualquier archivo bajo `supabase/functions/**`
#     o `supabase/config.toml` (idempotente — si los archivos no han cambiado,
#     el filtro evita ejecutar el job).
#   - workflow_dispatch (manual) — útil para forzar un redeploy aunque no haya
#     cambios de código (p.ej. después de cambiar un secret del proyecto).
#
# Flujo:
#   1. Checkout (full clone para que el path filter funcione bien con diffs).
#   2. Setup Supabase CLI.
#   3. Detectar qué EFs han cambiado en este push (vs el commit anterior).
#      Si workflow_dispatch o no hay cambios detectables, desplegar TODAS.
#   4. `supabase functions deploy <ef>` por cada una.
#
# Por qué no `supabase functions deploy --all` siempre:
#   - Cada EF tarda ~20-30s en desplegarse. Con 30+ EFs son ~15 min.
#   - Deploy selectivo: 2-3 EFs cambian de media por PR → 1 min.
#
# Secrets requeridos en GitHub → Settings → Secrets → Actions:
#   - SUPABASE_ACCESS_TOKEN  Token personal del usuario que puede desplegar.
#                            Generar en https://supabase.com/dashboard/account/tokens
#                            ("Generate new token" → copy ONCE → guardar).
#   - SUPABASE_PROJECT_REF   El ref del proyecto destino. Para el deploy actual:
#                            `jzgtghddqofxewzmpmbx` (sin URL, solo el slug).
#
# Permisos y seguridad:
#   - El token tiene scope "personal" — si lo filtras, el atacante puede
#     desplegar EFs ARBITRARIAS en cualquier proyecto donde tu user sea
#     miembro. Rotarlo regularmente y restringir si Supabase añade scopes.
#   - El service_role JWT NO se necesita aquí: la EF, una vez desplegada,
#     usa el suyo propio inyectado por el runtime de Supabase.
# ============================================================================

name: Deploy Edge Functions

on:
  push:
    branches: [main]
    paths:
      - 'supabase/functions/**'
      - 'supabase/config.toml'
      - '.github/workflows/deploy-functions.yml'
  workflow_dispatch:
    inputs:
      function_name:
        description: 'Nombre de una EF específica a desplegar (vacío = todas las que existan)'
        required: false
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}

    steps:
      - name: Checkout (full history para diff)
        uses: actions/checkout@v4
        with:
          # Fetch 2 commits para que `git diff HEAD^ HEAD` funcione en push.
          # Para workflow_dispatch el diff no se usa.
          fetch-depth: 2

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Detectar EFs cambiadas
        id: detect
        shell: bash
        run: |
          set -euo pipefail

          # workflow_dispatch con nombre explícito → desplegar solo esa.
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] \
             && [ -n "${{ github.event.inputs.function_name }}" ]; then
            echo "functions=${{ github.event.inputs.function_name }}" >> "$GITHUB_OUTPUT"
            echo "reason=manual_single" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # workflow_dispatch sin nombre, o push con cambios solo en _shared/
          # → desplegar TODAS las EFs (porque _shared cambia varias).
          DEPLOY_ALL=false
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            DEPLOY_ALL=true
          else
            # Hay cambios en _shared? Despliega todas (puede afectar a varias).
            if git diff --name-only HEAD^ HEAD \
                 | grep -qE '^supabase/functions/_shared/|^supabase/config\.toml'; then
              DEPLOY_ALL=true
            fi
          fi

          if [ "$DEPLOY_ALL" = "true" ]; then
            # Lista todas las EFs (carpetas dentro de supabase/functions/ que
            # no empiecen por _).
            FNS=$(find supabase/functions -maxdepth 1 -mindepth 1 -type d \
                    -not -name '_*' \
                    -exec basename {} \; \
                    | sort \
                    | tr '\n' ' ')
            echo "functions=$FNS" >> "$GITHUB_OUTPUT"
            echo "reason=deploy_all" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Push normal: solo las EFs cuyo index.ts (o cualquier archivo en
          # su carpeta) ha cambiado.
          CHANGED=$(git diff --name-only HEAD^ HEAD \
                      | grep '^supabase/functions/' \
                      | awk -F'/' '{print $3}' \
                      | grep -v '^_' \
                      | sort -u \
                      | tr '\n' ' ')

          if [ -z "$CHANGED" ]; then
            echo "functions=" >> "$GITHUB_OUTPUT"
            echo "reason=nothing_changed" >> "$GITHUB_OUTPUT"
          else
            echo "functions=$CHANGED" >> "$GITHUB_OUTPUT"
            echo "reason=detected_changes" >> "$GITHUB_OUTPUT"
          fi

      - name: Mostrar plan
        run: |
          echo "Razón: ${{ steps.detect.outputs.reason }}"
          echo "EFs a desplegar: ${{ steps.detect.outputs.functions }}"

      - name: Deploy
        if: ${{ steps.detect.outputs.functions != '' }}
        shell: bash
        run: |
          set -euo pipefail
          FNS="${{ steps.detect.outputs.functions }}"
          FAIL=0
          for fn in $FNS; do
            echo "─── Desplegando: $fn ───"
            if supabase functions deploy "$fn" \
                 --project-ref "$SUPABASE_PROJECT_REF"; then
              echo "✓ $fn OK"
            else
              echo "✗ $fn FAIL"
              FAIL=$((FAIL+1))
            fi
          done
          if [ "$FAIL" -gt 0 ]; then
            echo "::error::$FAIL EFs fallaron al desplegar"
            exit 1
          fi

      - name: Sin cambios — skip
        if: ${{ steps.detect.outputs.functions == '' }}
        run: echo "No hay EFs cambiadas en este push. Nada que hacer."
