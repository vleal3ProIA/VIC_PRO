include: package:very_good_analysis/analysis_options.yaml

analyzer:
  language:
    strict-casts: true
    strict-inference: true
    strict-raw-types: true

  errors:
    # Treat missing required parameters as errors
    missing_required_param: error
    missing_return: error
    # Allow TODO comments without warning during development
    todo: ignore
    # Avoid noise from generated code
    invalid_annotation_target: ignore

  exclude:
    - "**/*.g.dart"
    - "**/*.freezed.dart"
    - "**/*.gr.dart"
    - "**/*.config.dart"
    - "**/*.mocks.dart"
    - "**/generated/**"
    - "lib/l10n/generated/**"
    - "build/**"
    - ".dart_tool/**"

linter:
  rules:
    # Documentation
    public_member_api_docs: false
    lines_longer_than_80_chars: false

    # Style — overrides over very_good_analysis defaults to keep things pragmatic
    always_use_package_imports: false   # relative imports inside lib/ are fine
    prefer_relative_imports: false
    sort_pub_dependencies: false        # we group deps by category, not alpha
    cascade_invocations: false          # we use multiple cascades for grouping
    comment_references: false           # allow cross-file doc references
    omit_local_variable_types: false    # explicit types are often clearer
    avoid_redundant_argument_values: false
    one_member_abstracts: false         # UseCase base classes use single method
    avoid_types_as_parameter_names: false
    no_runtimetype_tostring: false

    # Style — keep enforced
    prefer_single_quotes: true
    prefer_const_constructors: true
    prefer_const_literals_to_create_immutables: true
    prefer_const_declarations: true
    prefer_final_locals: true
    prefer_final_in_for_each: true
    avoid_print: true
    sort_constructors_first: true
    sort_unnamed_constructors_first: true

    # Safety
    always_declare_return_types: true
    avoid_dynamic_calls: true
    avoid_empty_else: true
    avoid_slow_async_io: true
    avoid_type_to_string: true
    cancel_subscriptions: true
    close_sinks: true
    no_adjacent_strings_in_list: true
    throw_in_finally: true
    unnecessary_statements: true

    # Architecture
    use_key_in_widget_constructors: true
    require_trailing_commas: true
