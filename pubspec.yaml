name: myapp
description: "Enterprise Flutter web application with Riverpod + Supabase."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter
  web: ^1.1.0

  # Backend
  supabase_flutter: ^2.8.0

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Routing
  go_router: ^14.2.7

  # Functional / results
  fpdart: ^1.1.0

  # Local storage
  shared_preferences: ^2.3.2
  flutter_secure_storage: ^9.2.2

  # Serialization
  json_annotation: ^4.9.0
  freezed_annotation: ^3.0.0

  # UI / theming
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.4.1
  responsive_framework: ^1.5.1
  flex_color_scheme: ^8.0.0

  # Forms & validation
  formz: ^0.7.0

  # Auth helpers
  local_auth: ^2.3.0
  qr_flutter: ^4.1.0

  # Logging
  logger: ^2.4.0

  # i18n
  intl: ^0.20.0

  # Utilities
  uuid: ^4.5.1
  collection: ^1.18.0
  url_launcher: ^6.3.0

  # Environment config
  flutter_dotenv: ^5.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter

  # Lints
  very_good_analysis: ^6.0.0
  custom_lint: ^0.7.6
  riverpod_lint: ^2.6.0

  # Code generation
  build_runner: ^2.4.13
  freezed: ^3.0.0
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.0

  # Testing
  mocktail: ^1.0.4
  golden_toolkit: ^0.15.0
  network_image_mock: ^2.1.1

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/translations/
    - .env
