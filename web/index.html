<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Enterprise Flutter web application">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="myapp">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>myapp</title>
  <link rel="manifest" href="manifest.json">

  <!--
    @simplewebauthn/browser — wrapper alrededor de navigator.credentials que
    se ocupa de codificar/decodificar ArrayBuffers a base64url y de los
    detalles tediosos de la "ceremonia" WebAuthn. Lo expone como
    `window.SimpleWebAuthnBrowser` (UMD). Lo invocamos desde Dart vía
    `dart:js_interop` (ver `lib/features/auth/data/webauthn/webauthn_js.dart`).
  -->
  <script src="https://unpkg.com/@simplewebauthn/browser@10.0.0/dist/bundle/index.umd.min.js"></script>

  <!--
    Stripe.js v3 — necesario para Embedded Checkout. Lo expone como
    `window.Stripe(publishableKey)`. Lo invocamos desde Dart vía
    `dart:js_interop` (ver `lib/features/billing/data/stripe_js.dart`).
    Carga async para no bloquear; la página de checkout espera a que esté
    disponible antes de mount.
  -->
  <script src="https://js.stripe.com/v3/" async></script>
</head>
<body>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
